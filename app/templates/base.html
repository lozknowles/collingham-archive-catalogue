<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Collingham Archive Catalogue" }}</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --ink: #1f1a17;
        --muted: #6c6258;
        --line: #cfc3b4;
        --accent: #3d5a40;
        --accent-soft: #e3efe2;
        --warn: #7a4c1f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, var(--bg), #ede5d7);
        color: var(--ink);
      }
      header, main { max-width: 1200px; margin: 0 auto; padding: 1rem; }
      header {
        display: flex; gap: 1rem; align-items: baseline; flex-wrap: wrap;
        border-bottom: 1px solid var(--line);
      }
      nav a {
        margin-right: 1rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }
      h1, h2, h3 { margin: 0 0 .75rem 0; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem;
        margin: 1rem 0;
        box-shadow: 0 1px 2px rgba(0,0,0,.04);
      }
      .grid { display: grid; gap: 1rem; }
      .two-col { grid-template-columns: 2fr 1fr; }
      label { display: block; font-size: .95rem; margin: .75rem 0 .25rem; color: var(--muted); }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: .65rem .75rem;
        font: inherit;
        background: white;
      }
      textarea { min-height: 4.5rem; }
      .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; }
      .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
      .button {
        display: inline-block;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: var(--accent);
        color: white;
        padding: .55rem .9rem;
        text-decoration: none;
        cursor: pointer;
        font: inherit;
      }
      .button.secondary {
        background: transparent;
        color: var(--accent);
      }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: .55rem .35rem; border-bottom: 1px solid var(--line); vertical-align: top; }
      .meta { color: var(--muted); font-size: .95rem; }
      .pill {
        display: inline-block; padding: .2rem .55rem; border-radius: 999px;
        background: var(--accent-soft); color: var(--accent); font-size: .85rem; font-weight: 700;
      }
      .warning { color: var(--warn); }
      code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      pre { white-space: pre-wrap; }
      .stack > * + * { margin-top: .75rem; }
      .small { font-size: .9rem; }
      .muted { color: var(--muted); }
      @media (max-width: 800px) {
        .two-col, .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Collingham Archive Catalogue</h1>
        <div class="meta">Archivist review tool for SQLite-backed catalogue records</div>
      </div>
      <nav>
        <a href="{{ url_for('record_list') }}">Records</a>
        <a href="{{ url_for('review_queue') }}">Review Queue</a>
        <a href="{{ url_for('lexicon') }}">Lexicon</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
